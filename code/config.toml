[project]
name = "glm-hmm"
seed = 12345

[model]
num_states = 2
num_classes = 3
tau = 50

[encoding.stimd]
0 = "SIL"
1 = "SS"
2 = "SM"
3 = "SL"
4 = "VG"

[encoding.ttype]
0 = "VG"
1 = "DS"
2 = "DM"
3 = "DL"

[encoding.side]
0 = "L"
1 = "C"
2 = "R"

[plots]
dpi = 300
style = "white"
context = "talk"
font_scale = 1
grid_alpha = 0.3
figsize_small = [
    6,
    3,
]
figsize_medium = [
    10,
    4,
]
figsize_large = [
    12,
    5,
]
heatmap_cmap = "viridis"
weights_cmap = "RdBu_r"

[plots.ttype]
order = [
    "VG",
    "DS",
    "DM",
    "DL",
]
labels = [
    "Visual",
    "Easy",
    "Medium",
    "Hard",
]
palette = [
    "#230027",
    "#C88FEC",
    "#9C69A3",
    "#C698CB",
]

[plots.stimd]
order = [
    "SS",
    "SM",
    "SL",
]
labels = [
    "Short",
    "Med",
    "Long",
]
palette = [
    "#FFB74D",
    "#FB8C00",
    "#EF6C00",
]

[plots.delay]
order = [
    "DS",
    "DM",
    "DL",
]
labels = [
    "Short",
    "Med",
    "Long",
]
palette = [
    "#5E2A7E",
    "#9C69A3",
    "#C698CB",
]

[palettes]
states_palette = "Dark2"
states_palette_n = 3
states_hex = [
    "#1B9E77",
    "#D95F02",
    "#7570B3",
]

[labels]
sL = "$s_L$"
sC = "$s_C$"
sR = "$s_R$"
noise_amp = "$\\sigma$"
S_amplitude = "$S^{amp}$"
S_d = "$S^d$"
U_int_amplitude = "$U_{int}^{amp}$"
U_int_baseline = "$U_{int}^{baseline}$"
U_int_onset = "$U_{int}^{onset}$"
U_ext_amplitude = "$U_{ext}^{amp}$"
rel_vs_ceiling_bal = "Goodness of fit"
nll_trial = "NLL / trial"

[colors.parameters]
sL = "#66C2A5"
sC = "#FC8D62"
sR = "#8DA0CB"
U_int_amplitude = "#C38DFF"
U_int_baseline = "#C38DFF"
U_int_onset = "#C38DFF"
S_amplitude = "#FFA64C"
S_d = "#FFA64C"
U_ext_amplitude = "#3385FF"
noise_amp = "#999999"
nll_trial = "#999999"
rel_vs_ceiling_bal = "#999999"

[colors.models]
spatialU_notrandom = "#1f77b4"
spatialU = "#ff7f0e"
temporalU = "#2ca02c"
spatial_reduced2 = "#9467bd"
spatial_reduced_cert = "#8c564b"
spatial_reduced3 = "#e377c2"
spatial_reduced3_randomx0 = "#e377c2"
externalU = "#7f7f7f"
externalU2 = "#17becf"
externalU2_randomx0 = "#0053CE"

[model_names]
spatialU_notrandom = "Spatial U (fixed $x_0$)"
spatialU = "Spatial U"
temporalU = "Temporal U"
spatial_reduced_cert = "Spatial U (reduced)"
spatial_reduced2 = "Spatial U (reduced 2)"
spatial_reduced3 = "Spatial U (reduced 3)"
externalU = "External U"
externalU2_randomx0 = "External U (random $x_0$)"
externalU2 = "External U comparable"

[parameters]
temporal = [
    "sL",
    "sC",
    "sR",
    "noise_amp",
    "S_amplitude",
    "S_d",
    "U_int_amplitude",
    "U_int_baseline",
    "U_int_onset",
    "U_ext_amplitude",
]
spatial = [
    "sL",
    "sC",
    "sR",
    "noise_amp",
    "S_amplitude",
    "S_d",
    "U_int_amplitude",
    "U_int_baseline",
    "U_ext_amplitude",
]
spatial_reduced = [
    "sL",
    "sC",
    "sR",
    "S_amplitude",
    "S_d",
    "U_int_amplitude",
]
spatial_reduced2 = [
    "sL",
    "sR",
    "S_amplitude",
    "S_d",
    "U_int_amplitude",
    "U_int_baseline",
]

[parameter_sets]
spatialU_notrandom = "spatial"
spatialU = "spatial"
temporalU = "temporal"
spatial_reduced_cert = "spatial_reduced"
spatial_reduced2 = "spatial_reduced"
spatial_reduced3 = "spatial_reduced2"
externalU2_randomx0 = "spatial"
externalU2 = "spatial"
